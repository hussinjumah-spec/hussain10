<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مكتبة الفيديوهات الإسلامية لجامع كرزكان الكبير">
    <title>مكتبة الفيديوهات الإسلامية | جامع كرزكان الكبير</title>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <i class="fa-solid fa-mosque brand-icon"></i>
                <h1>جامع كرزكان الكبير</h1>
            </div>
            
            <button class="mobile-menu-btn" aria-label="القائمة">
                <i class="fa-solid fa-bars"></i>
            </button>

            <ul class="nav-links">
                <li><a href="#" class="active" data-filter="all">الرئيسية</a></li>
                <li><a href="#" data-filter="kumayl">دعاء كميل</a></li>
                <li><a href="#" data-filter="nudba">دعاء الندبة</a></li>
                <li><a href="#" data-filter="general">أدعية عامة</a></li>
                <li><a href="#" data-filter="favorites" class="fav-link"><i class="fa-solid fa-star"></i> المفضلة</a></li>
            </ul>

            <div class="nav-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث عن فيديو...">
                    <i class="fa-solid fa-search search-icon"></i>
                </div>
                <button id="themeToggle" class="theme-btn" aria-label="تغيير المظهر">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h2>مكتبة الفيديوهات الإسلامية</h2>
            <p>مجموعة مختارة من الأدعية والمناجاة بأصوات خاشعة وتلاوات مميزة لترطيب القلوب.</p>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="main-container">
        <div class="section-title">
            <h3 id="currentCategoryTitle">جميع الفيديوهات</h3>
            <span id="resultsCount"></span>
        </div>
        
        <!-- Videos Grid -->
        <div id="videosGrid" class="videos-grid">
            <!-- Cards will be injected dynamically via JavaScript -->
        </div>

        <!-- No Results -->
        <div id="noResults" class="no-results hidden">
            <i class="fa-solid fa-box-open"></i>
            <p>لا توجد فيديوهات مطابقة للبحث أو التصنيف.</p>
        </div>
    </main>

    <!-- Video Popup Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" aria-label="إغلاق">&times;</button>
            <div class="video-wrapper">
                <iframe id="youtubePlayer" src="" title="Video Player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
